# Local infrastructure for CodeAtlas dev.
#
# Postgres + pgvector lives in Supabase (free tier is enough for dev), so we
# only need Redis locally to back BullMQ. Run `docker compose up -d` before
# `pnpm worker`.
services:
  redis:
    image: redis:7-alpine
    container_name: codeatlas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
